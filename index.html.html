<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-50: #FFFBEF;
    --gold-100: #FEF3C7;
    --gold-200: #FDE68A;
    --gold-300: #FCD34D;
    --gold-400: #FBBF24;
    --gold-500: #F59E0B;
    --gold-600: #D97706;
    --gold-700: #B45309;
    --gold-800: #92400E;
    --gold-900: #78350F;
    --green-dark: #1A2E1A;
    --green-mid: #2D4A2D;
    --bark: #3D2B1A;
    --cream: #FFFDF5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated bg dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(251,191,36,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(251,191,36,0.05) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(45,74,45,0.6) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-leaf {
    width: 36px;
    height: 36px;
    margin: 0 auto 0.75rem;
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 600;
    color: var(--gold-300);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(253,211,77,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* Puzzle select */
  .puzzle-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid rgba(251,191,36,0.2);
    background: transparent;
    color: rgba(253,211,77,0.55);
    transition: all 0.2s ease;
  }

  .tab:hover { border-color: rgba(251,191,36,0.5); color: var(--gold-300); }
  .tab.active {
    background: var(--gold-500);
    border-color: var(--gold-500);
    color: var(--green-dark);
  }

  /* Main layout */
  .game-layout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    width: 100%;
    max-width: 820px;
    justify-content: center;
  }

  /* Board */
  .board-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #canvas {
    display: block;
    border-radius: 12px;
    cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.15),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(251,191,36,0.04);
    transition: box-shadow 0.3s ease;
  }

  #canvas:hover {
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.3),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(251,191,36,0.08);
  }

  /* Win overlay */
  .win-overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: rgba(26,46,26,0.92);
    backdrop-filter: blur(6px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 10;
    animation: fadeIn 0.4s ease;
  }

  .win-overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

  .win-icon {
    width: 56px;
    height: 56px;
    background: rgba(251,191,36,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(251,191,36,0.3);
  }

  .win-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--gold-300);
  }

  .win-moves {
    font-size: 0.85rem;
    color: rgba(253,211,77,0.6);
    font-weight: 300;
  }

  .next-btn {
    margin-top: 0.5rem;
    padding: 10px 28px;
    background: var(--gold-500);
    color: var(--green-dark);
    border: none;
    border-radius: 24px;
    font-size: 0.88rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .next-btn:hover { background: var(--gold-300); transform: translateY(-1px); }

  /* Sidebar */
  .sidebar {
    flex: 0 0 180px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .info-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(251,191,36,0.1);
    border-radius: 12px;
    padding: 1rem;
  }

  .preview-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(253,211,77,0.4);
    margin-bottom: 0.6rem;
  }

  #preview {
    display: block;
    border-radius: 8px;
    width: 100%;
    border: 1px solid rgba(251,191,36,0.15);
  }

  .puzzle-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--gold-300);
    margin: 0.75rem 0 0.3rem;
  }

  .puzzle-hint {
    font-size: 0.75rem;
    color: rgba(253,211,77,0.45);
    line-height: 1.6;
    font-weight: 300;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 0.5rem;
  }

  .stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(251,191,36,0.08);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-val {
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--gold-300);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.62rem;
    color: rgba(253,211,77,0.35);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }

  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-outline {
    padding: 9px;
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 8px;
    background: transparent;
    color: rgba(253,211,77,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.03em;
    width: 100%;
  }

  .btn-outline:hover {
    border-color: rgba(251,191,36,0.45);
    color: var(--gold-300);
    background: rgba(251,191,36,0.05);
  }

  /* Timer bar */
  .timer-wrap {
    margin-top: 0.25rem;
  }

  .timer-bar-bg {
    height: 2px;
    background: rgba(251,191,36,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }

  .timer-bar-fill {
    height: 100%;
    background: var(--gold-400);
    border-radius: 2px;
    transition: width 0.9s linear;
    width: 100%;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(251,191,36,0.15);
    transition: background 0.3s ease;
  }

  .dot.done { background: var(--gold-500); }
  .dot.current { background: var(--gold-300); box-shadow: 0 0 6px rgba(253,211,77,0.5); }

  /* Responsive */
  @media (max-width: 650px) {
    .game-layout { flex-direction: column; align-items: center; }
    .sidebar { flex: none; width: 100%; max-width: 480px; flex-direction: row; flex-wrap: wrap; }
    .info-card { flex: 1 1 200px; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .action-btns { flex-direction: row; }
    .btn-outline { flex: 1; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrapper">

  <header>
    <svg class="logo-leaf" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 4C18 4 6 10 6 22C6 28.627 11.373 34 18 34C24.627 34 30 28.627 30 22C30 10 18 4 18 4Z" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.5)" stroke-width="1"/>
      <path d="M18 34L18 16" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-linecap="round"/>
      <path d="M18 22L12 16" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-linecap="round"/>
      <path d="M18 26L24 20" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <h1>Doğa Puzzle</h1>
    <p class="subtitle">16 × 16 Minimalist</p>
  </header>

  <div class="progress-dots" id="dots"></div>

  <div class="puzzle-tabs" id="tabs"></div>

  <div class="game-layout">
    <div class="board-wrap">
      <canvas id="canvas"></canvas>
      <div class="win-overlay" id="win-overlay">
        <div class="win-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M6 14L11 19L22 9" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="win-title">Tebrikler!</div>
        <div class="win-moves" id="win-moves">— hamlede tamamladınız</div>
        <button class="next-btn" id="next-btn">Sonraki Sahne →</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="info-card">
        <div class="preview-label">Hedef</div>
        <canvas id="preview" height="160"></canvas>
        <div class="puzzle-name" id="puzzle-name"></div>
        <div class="puzzle-hint" id="puzzle-hint"></div>
      </div>

      <div class="info-card">
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-val" id="stat-moves">0</div>
            <div class="stat-label">Hamle</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-time">0:00</div>
            <div class="stat-label">Süre</div>
          </div>
        </div>
        <div class="timer-wrap">
          <div class="timer-bar-bg">
            <div class="timer-bar-fill" id="timer-bar"></div>
          </div>
        </div>
      </div>

      <div class="info-card action-btns">
        <button class="btn-outline" id="shuffle-btn">↺ Yeniden Karıştır</button>
        <button class="btn-outline" id="hint-btn">◉ İpucu Göster</button>
      </div>
    </div>
  </div>

</div>

<script>
const PUZZLES = [
  {
    name: "Güneşli Orman",
    hint: "Işıltılı altın güneş ışınları ormana vururken ağaçlar uzanıyor.",
    draw(ctx, w, h) {
      ctx.fillStyle = "#FDF3D0"; ctx.fillRect(0,0,w,h);
      for(let i=0;i<10;i++){
        const x=w*(0.08+i*0.1), yw=h*0.35+i*5;
        ctx.save(); ctx.globalAlpha=0.12+i%3*0.04;
        ctx.fillStyle="#FBBF24";
        ctx.beginPath(); ctx.moveTo(w*0.5,h*0.06);
        ctx.lineTo(x-7,yw); ctx.lineTo(x+7,yw); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      const trees=[
        {x:0.1,h:0.56,c:"#3B6D11",c2:"#27500A"},{x:0.24,h:0.63,c:"#639922",c2:"#3B6D11"},
        {x:0.4,h:0.58,c:"#27500A",c2:"#1A3A0D"},{x:0.56,h:0.66,c:"#3B6D11",c2:"#27500A"},
        {x:0.72,h:0.53,c:"#639922",c2:"#3B6D11"},{x:0.88,h:0.61,c:"#27500A",c2:"#1A3A0D"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, ty=h*(1-t.h), tw=w*0.09, th=h*t.h*0.72;
        ctx.fillStyle=t.c;
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-tw/2,ty+th); ctx.lineTo(tx+tw/2,ty+th); ctx.closePath(); ctx.fill();
        ctx.fillStyle=t.c2;
        ctx.beginPath(); ctx.moveTo(tx,ty+th*0.25); ctx.lineTo(tx-tw*0.65,ty+th*0.85); ctx.lineTo(tx+tw*0.65,ty+th*0.85); ctx.closePath(); ctx.fill();
        ctx.fillStyle="#4A2C0A";
        ctx.fillRect(tx-w*0.013,ty+th*0.82,w*0.026,h*t.h*0.2);
      });
      ctx.fillStyle="#EF9F27";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.058,w*0.058,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.042,w*0.042,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FDE68A";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.025,w*0.025,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#C0DD97"; ctx.fillRect(0,h*0.87,w,h*0.13);
      ctx.fillStyle="#97C459";
      for(let i=0;i<24;i++) ctx.fillRect(i*(w/24),h*0.87-3+Math.sin(i*0.9)*4,w/24+1,6);
      ctx.fillStyle="#639922";
      for(let i=0;i<14;i++) ctx.fillRect(i*(w/14)+4,h*0.9-2+Math.sin(i)*3,8,5);
    }
  },
  {
    name: "Sonbahar Vadisi",
    hint: "Altın sarısı yapraklar dökülen huzurlu bir vadi.",
    draw(ctx, w, h) {
      ctx.fillStyle="#FBE8B0"; ctx.fillRect(0,0,w,h);
      const sky=ctx.createLinearGradient(0,0,0,h*0.4);
      sky.addColorStop(0,"#FDE68A"); sky.addColorStop(1,"#FBE8B0");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.45);
      const mts=[
        {x:0,y:0.43,w:0.38,c:"#B4B2A9"},{x:0.18,y:0.36,w:0.42,c:"#D3D1C7"},
        {x:0.54,y:0.39,w:0.47,c:"#B4B2A9"},{x:0.7,y:0.32,w:0.35,c:"#D3D1C7"}
      ];
      mts.forEach(m=>{
        ctx.fillStyle=m.c;
        ctx.beginPath(); ctx.moveTo(w*m.x,h); ctx.lineTo(w*(m.x+m.w/2),h*m.y); ctx.lineTo(w*(m.x+m.w),h); ctx.closePath(); ctx.fill();
      });
      const trees=[
        {x:0.08,h:0.48,c:"#BA7517"},{x:0.2,h:0.55,c:"#EF9F27"},{x:0.33,h:0.50,c:"#D97706"},
        {x:0.48,h:0.58,c:"#BA7517"},{x:0.62,h:0.45,c:"#EF9F27"},{x:0.76,h:0.52,c:"#D97706"},
        {x:0.9,h:0.42,c:"#BA7517"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, ty=h*(1-t.h), r=w*0.072;
        ctx.fillStyle=t.c;
        ctx.beginPath(); ctx.ellipse(tx,ty,r,r*1.25,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=t.c+"CC";
        ctx.beginPath(); ctx.ellipse(tx-r*0.3,ty+r*0.3,r*0.65,r*0.85,0.3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4A2C0A";
        ctx.fillRect(tx-2.5,ty+r*1.1,5,h*t.h*0.35);
      });
      for(let i=0;i<35;i++){
        const lc=["#FBBF24","#EF9F27","#BA7517","#D97706"][i%4];
        ctx.save(); ctx.globalAlpha=0.65+Math.random()*0.3;
        ctx.fillStyle=lc;
        const fx=Math.random()*w, fy=h*0.56+Math.random()*h*0.36;
        ctx.beginPath(); ctx.ellipse(fx,fy,6,3.5,-0.5+Math.random(),0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle="#97C459"; ctx.fillRect(0,h*0.88,w,h*0.12);
      ctx.fillStyle="#639922";
      for(let i=0;i<18;i++) ctx.fillRect(i*(w/18),h*0.88-2+Math.sin(i)*3,w/18+1,5);
    }
  },
  {
    name: "Çöl Gün Batımı",
    hint: "Kaktüs siluetleri önünde alev renkli portakal gün batımı.",
    draw(ctx, w, h) {
      const sky=ctx.createLinearGradient(0,0,0,h*0.75);
      sky.addColorStop(0,"#DC2626"); sky.addColorStop(0.3,"#EA580C");
      sky.addColorStop(0.55,"#FBBF24"); sky.addColorStop(0.75,"#FDE68A");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      for(let i=0;i<6;i++){
        ctx.save(); ctx.globalAlpha=0.06+i*0.02;
        ctx.fillStyle="#FBBF24";
        ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*(0.08+i*0.07),h*(0.03+i*0.015),0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle="#EF9F27";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.065,w*0.065,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.048,w*0.048,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FDE68A";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.028,w*0.028,0,0,Math.PI*2); ctx.fill();
      const kakts=[
        {x:0.14,h:0.5,arm:-1},{x:0.35,h:0.32,arm:1},{x:0.55,h:0.28,arm:-1},
        {x:0.72,h:0.42,arm:1},{x:0.88,h:0.52,arm:-1}
      ];
      kakts.forEach(k=>{
        const kx=w*k.x, kh=h*k.h, ky=h-kh, kw=w*0.03;
        ctx.fillStyle="#1A3A0D";
        ctx.beginPath(); ctx.roundRect(kx-kw/2,ky,kw,kh,kw/2); ctx.fill();
        const ay=ky+kh*0.38, adir=k.arm;
        ctx.fillRect(kx-kw/2+adir*(adir<0?-kw*2.5:0),ay,kw*2.5,kw*0.85);
        ctx.beginPath(); ctx.roundRect(kx+adir*(kw/2+kw*2.5-kw/2)-kw/2+adir*(adir>0?kw/2:0),ay-kh*0.14,kw,kh*0.2,kw/2); ctx.fill();
        ctx.fillStyle="#97C459";
        ctx.beginPath(); ctx.ellipse(kx,ky+2,kw/2,kw/3,0,0,Math.PI*2); ctx.fill();
      });
      ctx.fillStyle="#888780";
      ctx.beginPath(); ctx.moveTo(0,h);
      ctx.bezierCurveTo(w*0.2,h*0.76, w*0.4,h*0.82, w*0.5,h*0.79);
      ctx.bezierCurveTo(w*0.6,h*0.76, w*0.8,h*0.74, w,h*0.78);
      ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
      ctx.fillStyle="#B4B2A9";
      ctx.beginPath(); ctx.moveTo(0,h*0.86);
      ctx.bezierCurveTo(w*0.25,h*0.82, w*0.5,h*0.88, w*0.75,h*0.83);
      ctx.quadraticCurveTo(w*0.88,h*0.8,w,h*0.85);
      ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();
    }
  },
  {
    name: "Göl Yansıması",
    hint: "Altın yapraklı ağaçların sakin bir gölde mükemmel yansıması.",
    draw(ctx, w, h) {
      ctx.fillStyle="#FDF3D0"; ctx.fillRect(0,0,w,h);
      const sky=ctx.createLinearGradient(0,0,0,h*0.28);
      sky.addColorStop(0,"#FDE68A"); sky.addColorStop(1,"#FDF3D0");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.3);
      ctx.fillStyle="#85B7EB";
      ctx.fillRect(0,h*0.3,w,h*0.38);
      for(let i=0;i<8;i++){
        ctx.save(); ctx.globalAlpha=0.06;
        ctx.fillStyle="#FDE68A";
        ctx.fillRect(0,h*(0.32+i*0.04),w,h*0.018);
        ctx.restore();
      }
      ctx.fillStyle="#FDF3D0"; ctx.fillRect(0,h*0.68,w,h*0.32);
      const trees=[
        {x:0.07,h:0.27,c:"#EF9F27"},{x:0.2,h:0.23,c:"#BA7517"},{x:0.35,h:0.29,c:"#EF9F27"},
        {x:0.5,h:0.25,c:"#639922"},{x:0.65,h:0.28,c:"#EF9F27"},{x:0.8,h:0.22,c:"#BA7517"},
        {x:0.93,h:0.26,c:"#D97706"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, r=w*0.062;
        ctx.fillStyle=t.c;
        ctx.beginPath(); ctx.ellipse(tx,h*t.h*0.65,r,r*1.3,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=t.c+"AA";
        ctx.beginPath(); ctx.ellipse(tx-r*0.3,h*t.h*0.65+r*0.4,r*0.55,r*0.8,0.25,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4A2C0A";
        ctx.fillRect(tx-2,h*t.h*0.65+r*1.2,4,h*0.28-h*t.h*0.65-r*1.2+h*0.002);
        ctx.save(); ctx.globalAlpha=0.45;
        const ry=h*0.3+(h*0.3-h*t.h*0.65);
        ctx.fillStyle=t.c;
        ctx.beginPath(); ctx.ellipse(tx,ry+r*0.4,r*0.9,r*1.1,Math.PI,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
      ctx.fillStyle="#EF9F27";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.07,w*0.06,w*0.06,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.07,w*0.044,w*0.044,0,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.globalAlpha=0.25;
      ctx.fillStyle="#EF9F27";
      ctx.beginPath(); ctx.ellipse(w*0.5,h*0.52,w*0.048,w*0.025,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle="#97C459"; ctx.fillRect(0,h*0.68,w,h*0.04);
      ctx.fillStyle="#3B6D11";
      for(let i=0;i<22;i++) ctx.fillRect(i*(w/22),h*0.68-2+Math.sin(i*0.8)*3,w/22+1,5);
    }
  },
  {
    name: "Bahar Çayırı",
    hint: "Çiçekli sarı bir çayırda ağırlık hissettiren güneşli gün.",
    draw(ctx, w, h) {
      const sky=ctx.createLinearGradient(0,0,0,h*0.55);
      sky.addColorStop(0,"#BFDBFE"); sky.addColorStop(1,"#E0F2FE");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      ctx.fillStyle="rgba(255,255,255,0.8)";
      [[0.15,0.12,0.1],[0.6,0.08,0.13],[0.4,0.18,0.08],[0.8,0.15,0.1]].forEach(([cx,cy,r])=>{
        ctx.beginPath(); ctx.ellipse(w*cx,h*cy,w*r,h*r*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(w*(cx+r*0.6),h*cy,w*r*0.7,h*r*0.35,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(w*(cx-r*0.5),h*(cy+0.02),w*r*0.65,h*r*0.3,0,0,Math.PI*2); ctx.fill();
      });
      ctx.fillStyle="#639922"; ctx.fillRect(0,h*0.52,w,h*0.48);
      for(let i=0;i<30;i++){
        const gx=i*(w/30), gh=h*0.04+Math.sin(i*1.3)*h*0.02;
        ctx.fillStyle=i%2?"#97C459":"#3B6D11";
        ctx.fillRect(gx,h*0.52-gh,w/30+1,gh+2);
      }
      const flowers=[
        {x:0.06,y:0.62,c:"#EF9F27"},{x:0.18,y:0.7,c:"#FBBF24"},{x:0.3,y:0.58,c:"#EF9F27"},
        {x:0.44,y:0.75,c:"#D97706"},{x:0.56,y:0.63,c:"#FBBF24"},{x:0.68,y:0.68,c:"#EF9F27"},
        {x:0.8,y:0.6,c:"#D97706"},{x:0.92,y:0.72,c:"#FBBF24"},
        {x:0.12,y:0.8,c:"#FBBF24"},{x:0.25,y:0.86,c:"#EF9F27"},{x:0.5,y:0.9,c:"#D97706"},
        {x:0.75,y:0.83,c:"#EF9F27"},{x:0.88,y:0.88,c:"#FBBF24"}
      ];
      flowers.forEach(f=>{
        const fx=w*f.x, fy=h*f.y, r=w*0.018;
        for(let a=0;a<6;a++){
          const ax=fx+Math.cos(a*Math.PI/3)*r*1.6, ay=fy+Math.sin(a*Math.PI/3)*r*1.3;
          ctx.fillStyle=f.c; ctx.beginPath(); ctx.ellipse(ax,ay,r,r*0.7,a*Math.PI/3,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle="#FDE68A"; ctx.beginPath(); ctx.ellipse(fx,fy,r*0.7,r*0.7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#3B6D11"; ctx.fillRect(fx-1,fy+r,2,h*0.08);
      });
      ctx.fillStyle="#EF9F27";
      ctx.beginPath(); ctx.ellipse(w*0.78,h*0.1,w*0.055,w*0.055,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24";
      ctx.beginPath(); ctx.ellipse(w*0.78,h*0.1,w*0.038,w*0.038,0,0,Math.PI*2); ctx.fill();
    }
  }
];

const GRID=16, CELLS=GRID*GRID;
let currentPuzzle=0, board=[], moves=0, empty=CELLS-1;
let cellW,cellH,cw,ch,offscreen;
let won=false,seconds=0,timerInt=null,completed=[];
let hintMode=false;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const previewC=document.getElementById("preview");
const pctx=previewC.getContext("2d");
const winOverlay=document.getElementById("win-overlay");
const statMoves=document.getElementById("stat-moves");
const statTime=document.getElementById("stat-time");
const timerBar=document.getElementById("timer-bar");

function initUI(){
  const tabs=document.getElementById("tabs");
  const dots=document.getElementById("dots");
  tabs.innerHTML=""; dots.innerHTML="";
  PUZZLES.forEach((p,i)=>{
    const tab=document.createElement("button");
    tab.className="tab"+(i===currentPuzzle?" active":"");
    tab.textContent=p.name;
    tab.onclick=()=>loadPuzzle(i);
    tabs.appendChild(tab);
    const dot=document.createElement("div");
    dot.className="dot"+(completed.includes(i)?" done":i===currentPuzzle?" current":"");
    dots.appendChild(dot);
  });
}

function loadPuzzle(idx){
  won=false; moves=0; hintMode=false;
  currentPuzzle=idx%PUZZLES.length;
  const p=PUZZLES[currentPuzzle];
  document.getElementById("puzzle-name").textContent=p.name;
  document.getElementById("puzzle-hint").textContent=p.hint;
  winOverlay.classList.remove("show");
  statMoves.textContent="0";
  clearInterval(timerInt);
  seconds=0; statTime.textContent="0:00";
  timerBar.style.width="100%";
  initUI();

  const maxW=Math.min(480, window.innerWidth-220);
  cw=maxW; ch=maxW;
  canvas.width=cw*2; canvas.height=ch*2;
  canvas.style.width=cw+"px"; canvas.style.height=ch+"px";
  ctx.scale(2,2);

  const pw=previewC.parentElement.clientWidth-32||148;
  previewC.width=pw*2; previewC.height=pw*2;
  previewC.style.width=pw+"px"; previewC.style.height=pw+"px";
  pctx.scale(2,2);

  offscreen=document.createElement("canvas");
  offscreen.width=cw; offscreen.height=ch;
  const octx=offscreen.getContext("2d");
  p.draw(octx,cw,ch);

  pctx.clearRect(0,0,pw,pw);
  pctx.drawImage(offscreen,0,0,pw,pw);

  cellW=cw/GRID; cellH=ch/GRID;
  board=Array.from({length:CELLS},(_,i)=>i);
  empty=CELLS-1;
  shuffle();
  render();

  timerInt=setInterval(()=>{
    if(won)return;
    seconds++;
    const m=Math.floor(seconds/60),s=seconds%60;
    statTime.textContent=m+":"+(s<10?"0":"")+s;
  },1000);
}

function shuffle(){
  for(let i=0;i<CELLS*12;i++){
    const nb=neighbors(empty);
    const n=nb[Math.floor(Math.random()*nb.length)];
    board[empty]=board[n]; board[n]=CELLS-1; empty=n;
  }
  if(isSolved()) shuffle();
}

function neighbors(idx){
  const r=Math.floor(idx/GRID),c=idx%GRID,ns=[];
  if(r>0)ns.push(idx-GRID); if(r<GRID-1)ns.push(idx+GRID);
  if(c>0)ns.push(idx-1); if(c<GRID-1)ns.push(idx+1);
  return ns;
}

function isSolved(){ return board.every((v,i)=>v===i); }

function render(){
  ctx.clearRect(0,0,cw,ch);
  for(let i=0;i<CELLS;i++){
    const tile=board[i];
    if(tile===CELLS-1) continue;
    const dr=Math.floor(i/GRID),dc=i%GRID;
    const sr=Math.floor(tile/GRID),sc=tile%GRID;
    ctx.drawImage(offscreen,sc*cellW,sr*cellH,cellW,cellH,dc*cellW,dr*cellH,cellW,cellH);
    if(hintMode && tile===i){
      ctx.save(); ctx.globalAlpha=0.25;
      ctx.fillStyle="#FBBF24";
      ctx.fillRect(dc*cellW,dr*cellH,cellW,cellH);
      ctx.restore();
    }
  }
  ctx.strokeStyle="rgba(255,255,255,0.18)";
  ctx.lineWidth=0.5;
  for(let r=0;r<=GRID;r++){ctx.beginPath();ctx.moveTo(0,r*cellH);ctx.lineTo(cw,r*cellH);ctx.stroke();}
  for(let c=0;c<=GRID;c++){ctx.beginPath();ctx.moveTo(c*cellW,0);ctx.lineTo(c*cellW,ch);ctx.stroke();}
  const er=Math.floor(empty/GRID),ec=empty%GRID;
  ctx.fillStyle="rgba(251,191,36,0.10)";
  ctx.fillRect(ec*cellW,er*cellH,cellW,cellH);
}

function tileAt(x,y){
  const c=Math.floor(x/cellW),r=Math.floor(y/cellH);
  if(c<0||c>=GRID||r<0||r>=GRID)return -1;
  return r*GRID+c;
}

canvas.addEventListener("click",e=>{
  if(won)return;
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(cw/rect.width);
  const y=(e.clientY-rect.top)*(ch/rect.height);
  const idx=tileAt(x,y);
  if(idx<0)return;
  if(neighbors(empty).includes(idx)){
    board[empty]=board[idx]; board[idx]=CELLS-1; empty=idx;
    moves++;
    statMoves.textContent=moves;
    render();
    if(isSolved()) setTimeout(win,80);
  }
});

function win(){
  won=true; clearInterval(timerInt);
  if(!completed.includes(currentPuzzle)) completed.push(currentPuzzle);
  render();
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById("win-moves").textContent=
    moves+" hamlede, "+m+":"+String(s).padStart(2,"0")+"'de tamamladınız";
  document.getElementById("next-btn").textContent=
    currentPuzzle<PUZZLES.length-1 ? "Sonraki Sahne →" : "Baştan Oyna ↺";
  winOverlay.classList.add("show");
  initUI();
}

document.getElementById("next-btn").addEventListener("click",()=>{
  loadPuzzle(currentPuzzle+1);
});

document.getElementById("shuffle-btn").addEventListener("click",()=>{
  if(won)return;
  shuffle(); render();
  moves=0; statMoves.textContent="0";
  seconds=0; statTime.textContent="0:00";
});

document.getElementById("hint-btn").addEventListener("click",()=>{
  hintMode=!hintMode;
  document.getElementById("hint-btn").textContent=hintMode?"◎ İpucunu Gizle":"◉ İpucu Göster";
  render();
});

window.addEventListener("resize",()=>{ loadPuzzle(currentPuzzle); });

loadPuzzle(0);
</script>

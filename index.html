<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğa Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-300: #FCD34D;
    --gold-400: #FBBF24;
    --gold-500: #F59E0B;
    --gold-600: #D97706;
    --green-dark: #1A2E1A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(251,191,36,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(251,191,36,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  header { text-align: center; margin-bottom: 1.5rem; }

  .logo-leaf { width: 36px; height: 36px; margin: 0 auto 0.75rem; display: block; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 600;
    color: var(--gold-300);
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(253,211,77,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  .puzzle-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid rgba(251,191,36,0.2);
    background: transparent;
    color: rgba(253,211,77,0.55);
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .tab:hover { border-color: rgba(251,191,36,0.5); color: var(--gold-300); }
  .tab.active { background: var(--gold-500); border-color: var(--gold-500); color: #1A2E1A; }

  .game-layout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    width: 100%;
    max-width: 700px;
    justify-content: center;
  }

  .board-wrap { position: relative; flex-shrink: 0; }

  #canvas {
    display: block;
    border-radius: 14px;
    cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.15),
      0 20px 60px rgba(0,0,0,0.5);
    transition: box-shadow 0.3s ease;
  }

  #canvas:hover {
    box-shadow:
      0 0 0 1px rgba(251,191,36,0.35),
      0 20px 60px rgba(0,0,0,0.5);
  }

  .win-overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: rgba(26,46,26,0.92);
    backdrop-filter: blur(8px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 10;
    animation: fadeIn 0.4s ease;
  }

  .win-overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

  .win-icon {
    width: 60px; height: 60px;
    background: rgba(251,191,36,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(251,191,36,0.35);
  }

  .win-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--gold-300);
  }

  .win-moves {
    font-size: 0.85rem;
    color: rgba(253,211,77,0.6);
    font-weight: 300;
    text-align: center;
    padding: 0 1rem;
  }

  .next-btn {
    margin-top: 0.5rem;
    padding: 11px 30px;
    background: var(--gold-500);
    color: #1A2E1A;
    border: none;
    border-radius: 24px;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .next-btn:hover { background: var(--gold-300); transform: translateY(-1px); }

  .sidebar {
    flex: 0 0 160px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .info-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(251,191,36,0.1);
    border-radius: 12px;
    padding: 1rem;
  }

  .preview-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(253,211,77,0.4);
    margin-bottom: 0.6rem;
  }

  #preview {
    display: block;
    border-radius: 8px;
    width: 100%;
    border: 1px solid rgba(251,191,36,0.15);
  }

  .puzzle-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--gold-300);
    margin: 0.75rem 0 0.3rem;
  }

  .puzzle-hint {
    font-size: 0.75rem;
    color: rgba(253,211,77,0.45);
    line-height: 1.6;
    font-weight: 300;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(251,191,36,0.08);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-val {
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--gold-300);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.62rem;
    color: rgba(253,211,77,0.35);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }

  .action-btns { display: flex; flex-direction: column; gap: 6px; }

  .btn-outline {
    padding: 9px;
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 8px;
    background: transparent;
    color: rgba(253,211,77,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
  }

  .btn-outline:hover {
    border-color: rgba(251,191,36,0.45);
    color: var(--gold-300);
    background: rgba(251,191,36,0.05);
  }

  .progress-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(251,191,36,0.15);
    transition: background 0.3s ease;
  }

  .dot.done { background: var(--gold-500); }
  .dot.current { background: var(--gold-300); box-shadow: 0 0 6px rgba(253,211,77,0.5); }

  @media (max-width: 560px) {
    .game-layout { flex-direction: column; align-items: center; }
    .sidebar { flex: none; width: 100%; max-width: 380px; flex-direction: row; flex-wrap: wrap; }
    .info-card { flex: 1 1 160px; }
    .stats-grid { grid-template-columns: repeat(4,1fr); }
    .action-btns { flex-direction: row; }
    .btn-outline { flex: 1; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <svg class="logo-leaf" viewBox="0 0 36 36" fill="none">
      <path d="M18 4C18 4 6 10 6 22C6 28.627 11.373 34 18 34C24.627 34 30 28.627 30 22C30 10 18 4 18 4Z" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.5)" stroke-width="1"/>
      <path d="M18 34L18 16" stroke="rgba(251,191,36,0.4)" stroke-width="1" stroke-linecap="round"/>
      <path d="M18 22L12 16" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-linecap="round"/>
      <path d="M18 26L24 20" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <h1>Doğa Puzzle</h1>
    <p class="subtitle">2 × 2 Minimalist</p>
  </header>

  <div class="progress-dots" id="dots"></div>
  <div class="puzzle-tabs" id="tabs"></div>

  <div class="game-layout">
    <div class="board-wrap">
      <canvas id="canvas"></canvas>
      <div class="win-overlay" id="win-overlay">
        <div class="win-icon">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <path d="M6 15L12 21L24 9" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="win-title">Tebrikler!</div>
        <div class="win-moves" id="win-moves"></div>
        <button class="next-btn" id="next-btn">Sonraki Sahne →</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="info-card">
        <div class="preview-label">Hedef</div>
        <canvas id="preview"></canvas>
        <div class="puzzle-name" id="puzzle-name"></div>
        <div class="puzzle-hint" id="puzzle-hint"></div>
      </div>

      <div class="info-card">
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-val" id="stat-moves">0</div>
            <div class="stat-label">Hamle</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-time">0:00</div>
            <div class="stat-label">Süre</div>
          </div>
        </div>
      </div>

      <div class="info-card action-btns">
        <button class="btn-outline" id="shuffle-btn">↺ Yeniden Karıştır</button>
        <button class="btn-outline" id="hint-btn">◉ İpucu Göster</button>
      </div>
    </div>
  </div>

</div>

<script>
const PUZZLES = [
  {
    name: "Güneşli Orman",
    hint: "Altın güneş ışınları arasında yükselen yeşil ağaçlar.",
    draw(ctx, w, h) {
      ctx.fillStyle="#FDF3D0"; ctx.fillRect(0,0,w,h);
      for(let i=0;i<10;i++){
        const x=w*(0.08+i*0.1);
        ctx.save(); ctx.globalAlpha=0.1+i%3*0.04;
        ctx.fillStyle="#FBBF24";
        ctx.beginPath(); ctx.moveTo(w*0.5,h*0.06);
        ctx.lineTo(x-8,h*0.36+i*4); ctx.lineTo(x+8,h*0.36+i*4); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      const trees=[
        {x:0.1,h:0.56,c:"#3B6D11",c2:"#27500A"},{x:0.28,h:0.63,c:"#639922",c2:"#3B6D11"},
        {x:0.46,h:0.58,c:"#27500A",c2:"#1A3A0D"},{x:0.64,h:0.66,c:"#3B6D11",c2:"#27500A"},
        {x:0.82,h:0.53,c:"#639922",c2:"#3B6D11"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, ty=h*(1-t.h), tw=w*0.1, th=h*t.h*0.72;
        ctx.fillStyle=t.c;
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-tw/2,ty+th); ctx.lineTo(tx+tw/2,ty+th); ctx.closePath(); ctx.fill();
        ctx.fillStyle=t.c2;
        ctx.beginPath(); ctx.moveTo(tx,ty+th*0.28); ctx.lineTo(tx-tw*0.65,ty+th*0.85); ctx.lineTo(tx+tw*0.65,ty+th*0.85); ctx.closePath(); ctx.fill();
        ctx.fillStyle="#4A2C0A"; ctx.fillRect(tx-w*0.014,ty+th*0.82,w*0.028,h*t.h*0.2);
      });
      ctx.fillStyle="#EF9F27"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.062,w*0.062,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.044,w*0.044,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FDE68A"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.11,w*0.026,w*0.026,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#C0DD97"; ctx.fillRect(0,h*0.87,w,h*0.13);
      ctx.fillStyle="#97C459";
      for(let i=0;i<22;i++) ctx.fillRect(i*(w/22),h*0.87-3+Math.sin(i*0.9)*4,w/22+1,6);
    }
  },
  {
    name: "Sonbahar Vadisi",
    hint: "Altın ve turuncu yaprakların döküldüğü sonbahar vadisi.",
    draw(ctx, w, h) {
      const sky=ctx.createLinearGradient(0,0,0,h*0.45);
      sky.addColorStop(0,"#FDE68A"); sky.addColorStop(1,"#FBE8B0");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      const mts=[
        {x:0,y:0.44,w:0.4,c:"#B4B2A9"},{x:0.2,y:0.37,w:0.43,c:"#D3D1C7"},
        {x:0.56,y:0.40,w:0.44,c:"#B4B2A9"}
      ];
      mts.forEach(m=>{
        ctx.fillStyle=m.c;
        ctx.beginPath(); ctx.moveTo(w*m.x,h); ctx.lineTo(w*(m.x+m.w/2),h*m.y); ctx.lineTo(w*(m.x+m.w),h); ctx.closePath(); ctx.fill();
      });
      const trees=[
        {x:0.08,h:0.49,c:"#BA7517"},{x:0.22,h:0.56,c:"#EF9F27"},{x:0.36,h:0.51,c:"#D97706"},
        {x:0.52,h:0.59,c:"#BA7517"},{x:0.66,h:0.46,c:"#EF9F27"},{x:0.80,h:0.53,c:"#D97706"},
        {x:0.92,h:0.43,c:"#BA7517"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, ty=h*(1-t.h), r=w*0.075;
        ctx.fillStyle=t.c; ctx.beginPath(); ctx.ellipse(tx,ty,r,r*1.28,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=t.c+"BB"; ctx.beginPath(); ctx.ellipse(tx-r*0.28,ty+r*0.32,r*0.66,r*0.88,0.3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4A2C0A"; ctx.fillRect(tx-2.5,ty+r*1.1,5,h*t.h*0.34);
      });
      for(let i=0;i<32;i++){
        const lc=["#FBBF24","#EF9F27","#BA7517","#D97706"][i%4];
        ctx.save(); ctx.globalAlpha=0.7; ctx.fillStyle=lc;
        ctx.beginPath(); ctx.ellipse(Math.random()*w,h*0.57+Math.random()*h*0.35,6,3.5,-0.5+Math.random(),0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle="#97C459"; ctx.fillRect(0,h*0.88,w,h*0.12);
    }
  },
  {
    name: "Çöl Gün Batımı",
    hint: "Kaktüs siluetleri önünde alev renkli gün batımı gökyüzü.",
    draw(ctx, w, h) {
      const sky=ctx.createLinearGradient(0,0,0,h*0.76);
      sky.addColorStop(0,"#DC2626"); sky.addColorStop(0.3,"#EA580C");
      sky.addColorStop(0.55,"#FBBF24"); sky.addColorStop(0.75,"#FDE68A");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      ctx.fillStyle="#EF9F27"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.068,w*0.068,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.05,w*0.05,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FDE68A"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.38,w*0.03,w*0.03,0,0,Math.PI*2); ctx.fill();
      const kakts=[{x:0.13,h:0.5,d:-1},{x:0.34,h:0.33,d:1},{x:0.56,h:0.29,d:-1},{x:0.74,h:0.44,d:1},{x:0.89,h:0.53,d:-1}];
      kakts.forEach(k=>{
        const kx=w*k.x, kh=h*k.h, ky=h-kh, kw=w*0.031;
        ctx.fillStyle="#1A3A0D";
        ctx.fillRect(kx-kw/2,ky,kw,kh);
        const ay=ky+kh*0.38;
        ctx.fillRect(kx+(k.d<0?-kw/2-kw*2.4:kw/2),ay,kw*2.4,kw*0.88);
        ctx.fillRect(kx+(k.d<0?-kw/2-kw*2.4:kw/2+kw*1.6),ay-kh*0.15,kw*0.8,kh*0.2);
      });
      ctx.fillStyle="#888780";
      ctx.beginPath(); ctx.moveTo(0,h);
      ctx.bezierCurveTo(w*0.22,h*0.77,w*0.42,h*0.83,w*0.5,h*0.8);
      ctx.bezierCurveTo(w*0.6,h*0.77,w*0.8,h*0.75,w,h*0.79);
      ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
      ctx.fillStyle="#B4B2A9";
      ctx.beginPath(); ctx.moveTo(0,h*0.87);
      ctx.bezierCurveTo(w*0.26,h*0.83,w*0.52,h*0.89,w*0.76,h*0.84);
      ctx.quadraticCurveTo(w*0.88,h*0.81,w,h*0.86);
      ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();
    }
  },
  {
    name: "Göl Yansıması",
    hint: "Altın renkli ağaçların sakin bir gölde yansıması.",
    draw(ctx, w, h) {
      ctx.fillStyle="#FDF3D0"; ctx.fillRect(0,0,w,h);
      const sky=ctx.createLinearGradient(0,0,0,h*0.3);
      sky.addColorStop(0,"#FDE68A"); sky.addColorStop(1,"#FDF3D0");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.3);
      ctx.fillStyle="#85B7EB"; ctx.fillRect(0,h*0.3,w,h*0.38);
      for(let i=0;i<7;i++){
        ctx.save(); ctx.globalAlpha=0.05;
        ctx.fillStyle="#FDE68A"; ctx.fillRect(0,h*(0.33+i*0.045),w,h*0.018);
        ctx.restore();
      }
      ctx.fillStyle="#FDF3D0"; ctx.fillRect(0,h*0.68,w,h*0.32);
      const trees=[
        {x:0.07,h:0.27,c:"#EF9F27"},{x:0.2,h:0.23,c:"#BA7517"},{x:0.34,h:0.29,c:"#EF9F27"},
        {x:0.5,h:0.25,c:"#639922"},{x:0.65,h:0.28,c:"#EF9F27"},{x:0.8,h:0.22,c:"#BA7517"},{x:0.93,h:0.26,c:"#D97706"}
      ];
      trees.forEach(t=>{
        const tx=w*t.x, r=w*0.064;
        ctx.fillStyle=t.c; ctx.beginPath(); ctx.ellipse(tx,h*t.h*0.65,r,r*1.32,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=t.c+"AA"; ctx.beginPath(); ctx.ellipse(tx-r*0.3,h*t.h*0.65+r*0.4,r*0.56,r*0.82,0.25,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4A2C0A"; ctx.fillRect(tx-2,h*t.h*0.65+r*1.22,4,Math.max(2,h*0.3-h*t.h*0.65-r*1.22));
        ctx.save(); ctx.globalAlpha=0.42;
        const ry=h*0.3+(h*0.3-h*t.h*0.65);
        ctx.fillStyle=t.c; ctx.beginPath(); ctx.ellipse(tx,ry+r*0.42,r*0.88,r*1.08,Math.PI,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
      ctx.fillStyle="#EF9F27"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.07,w*0.062,w*0.062,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24"; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.07,w*0.046,w*0.046,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#97C459"; ctx.fillRect(0,h*0.68,w,h*0.04);
      ctx.fillStyle="#3B6D11";
      for(let i=0;i<20;i++) ctx.fillRect(i*(w/20),h*0.68-2+Math.sin(i*0.8)*3,w/20+1,5);
    }
  },
  {
    name: "Bahar Çayırı",
    hint: "Sarı çiçeklerle bezenmiş güneşli yeşil bir çayır.",
    draw(ctx, w, h) {
      const sky=ctx.createLinearGradient(0,0,0,h*0.55);
      sky.addColorStop(0,"#BFDBFE"); sky.addColorStop(1,"#E0F2FE");
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      ctx.fillStyle="rgba(255,255,255,0.82)";
      [[0.15,0.12,0.1],[0.62,0.08,0.12],[0.4,0.18,0.09]].forEach(([cx,cy,r])=>{
        ctx.beginPath(); ctx.ellipse(w*cx,h*cy,w*r,h*r*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(w*(cx+r*0.6),h*cy,w*r*0.72,h*r*0.36,0,0,Math.PI*2); ctx.fill();
      });
      ctx.fillStyle="#639922"; ctx.fillRect(0,h*0.52,w,h*0.48);
      for(let i=0;i<28;i++){
        const gx=i*(w/28), gh=h*0.04+Math.sin(i*1.3)*h*0.02;
        ctx.fillStyle=i%2?"#97C459":"#3B6D11";
        ctx.fillRect(gx,h*0.52-gh,w/28+1,gh+2);
      }
      const flowers=[
        {x:0.06,y:0.63,c:"#EF9F27"},{x:0.18,y:0.71,c:"#FBBF24"},{x:0.3,y:0.59,c:"#EF9F27"},
        {x:0.44,y:0.76,c:"#D97706"},{x:0.57,y:0.64,c:"#FBBF24"},{x:0.69,y:0.69,c:"#EF9F27"},
        {x:0.81,y:0.61,c:"#D97706"},{x:0.93,y:0.73,c:"#FBBF24"},
        {x:0.12,y:0.82,c:"#FBBF24"},{x:0.26,y:0.87,c:"#EF9F27"},{x:0.5,y:0.91,c:"#D97706"},
        {x:0.75,y:0.84,c:"#EF9F27"},{x:0.88,y:0.89,c:"#FBBF24"}
      ];
      flowers.forEach(f=>{
        const fx=w*f.x, fy=h*f.y, r=w*0.019;
        for(let a=0;a<6;a++){
          const ax=fx+Math.cos(a*Math.PI/3)*r*1.65, ay=fy+Math.sin(a*Math.PI/3)*r*1.35;
          ctx.fillStyle=f.c; ctx.beginPath(); ctx.ellipse(ax,ay,r,r*0.72,a*Math.PI/3,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle="#FDE68A"; ctx.beginPath(); ctx.ellipse(fx,fy,r*0.72,r*0.72,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#3B6D11"; ctx.fillRect(fx-1,fy+r,2,h*0.07);
      });
      ctx.fillStyle="#EF9F27"; ctx.beginPath(); ctx.ellipse(w*0.78,h*0.1,w*0.057,w*0.057,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#FBBF24"; ctx.beginPath(); ctx.ellipse(w*0.78,h*0.1,w*0.04,w*0.04,0,0,Math.PI*2); ctx.fill();
    }
  }
];

const GRID=2, CELLS=GRID*GRID;
let currentPuzzle=0, board=[], moves=0, empty=CELLS-1;
let cellW, cellH, cw, ch, offscreen;
let won=false, seconds=0, timerInt=null, completed=[];
let hintMode=false;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const previewC=document.getElementById("preview");
const pctx=previewC.getContext("2d");
const winOverlay=document.getElementById("win-overlay");
const statMoves=document.getElementById("stat-moves");
const statTime=document.getElementById("stat-time");

function initUI(){
  const tabs=document.getElementById("tabs");
  const dots=document.getElementById("dots");
  tabs.innerHTML=""; dots.innerHTML="";
  PUZZLES.forEach((p,i)=>{
    const tab=document.createElement("button");
    tab.className="tab"+(i===currentPuzzle?" active":"");
    tab.textContent=p.name;
    tab.onclick=()=>loadPuzzle(i);
    tabs.appendChild(tab);
    const dot=document.createElement("div");
    dot.className="dot"+(completed.includes(i)?" done":i===currentPuzzle?" current":"");
    dots.appendChild(dot);
  });
}

function loadPuzzle(idx){
  won=false; moves=0; hintMode=false;
  currentPuzzle=idx%PUZZLES.length;
  const p=PUZZLES[currentPuzzle];
  document.getElementById("puzzle-name").textContent=p.name;
  document.getElementById("puzzle-hint").textContent=p.hint;
  document.getElementById("hint-btn").textContent="◉ İpucu Göster";
  winOverlay.classList.remove("show");
  statMoves.textContent="0";
  clearInterval(timerInt);
  seconds=0; statTime.textContent="0:00";
  initUI();

  const maxW=Math.min(400, window.innerWidth-200);
  cw=maxW; ch=maxW;
  canvas.width=cw*2; canvas.height=ch*2;
  canvas.style.width=cw+"px"; canvas.style.height=ch+"px";
  ctx.scale(2,2);

  const pw=previewC.parentElement.clientWidth-32||128;
  previewC.width=pw*2; previewC.height=pw*2;
  previewC.style.width=pw+"px"; previewC.style.height=pw+"px";
  pctx.scale(2,2);

  offscreen=document.createElement("canvas");
  offscreen.width=cw; offscreen.height=ch;
  const octx=offscreen.getContext("2d");
  p.draw(octx,cw,ch);

  pctx.clearRect(0,0,pw,pw);
  pctx.drawImage(offscreen,0,0,pw,pw);

  cellW=cw/GRID; cellH=ch/GRID;
  board=Array.from({length:CELLS},(_,i)=>i);
  empty=CELLS-1;
  shuffle();
  render();

  timerInt=setInterval(()=>{
    if(won)return;
    seconds++;
    const m=Math.floor(seconds/60), s=seconds%60;
    statTime.textContent=m+":"+(s<10?"0":"")+s;
  },1000);
}

function shuffle(){
  for(let i=0;i<CELLS*30;i++){
    const nb=neighbors(empty);
    const n=nb[Math.floor(Math.random()*nb.length)];
    board[empty]=board[n]; board[n]=CELLS-1; empty=n;
  }
  if(isSolved()) shuffle();
}

function neighbors(idx){
  const r=Math.floor(idx/GRID), c=idx%GRID, ns=[];
  if(r>0) ns.push(idx-GRID);
  if(r<GRID-1) ns.push(idx+GRID);
  if(c>0) ns.push(idx-1);
  if(c<GRID-1) ns.push(idx+1);
  return ns;
}

function isSolved(){ return board.every((v,i)=>v===i); }

function render(){
  ctx.clearRect(0,0,cw,ch);
  for(let i=0;i<CELLS;i++){
    const tile=board[i];
    if(tile===CELLS-1) continue;
    const dr=Math.floor(i/GRID), dc=i%GRID;
    const sr=Math.floor(tile/GRID), sc=tile%GRID;
    ctx.drawImage(offscreen,sc*cellW,sr*cellH,cellW,cellH,dc*cellW,dr*cellH,cellW,cellH);
    if(hintMode && tile===i){
      ctx.save(); ctx.globalAlpha=0.3;
      ctx.fillStyle="#FBBF24";
      ctx.fillRect(dc*cellW,dr*cellH,cellW,cellH);
      ctx.restore();
    }
  }
  ctx.strokeStyle="rgba(255,255,255,0.3)";
  ctx.lineWidth=1.5;
  for(let r=0;r<=GRID;r++){ ctx.beginPath(); ctx.moveTo(0,r*cellH); ctx.lineTo(cw,r*cellH); ctx.stroke(); }
  for(let c=0;c<=GRID;c++){ ctx.beginPath(); ctx.moveTo(c*cellW,0); ctx.lineTo(c*cellW,ch); ctx.stroke(); }
  const er=Math.floor(empty/GRID), ec=empty%GRID;
  ctx.fillStyle="rgba(251,191,36,0.13)";
  ctx.fillRect(ec*cellW,er*cellH,cellW,cellH);
}

function tileAt(x,y){
  const c=Math.floor(x/cellW), r=Math.floor(y/cellH);
  if(c<0||c>=GRID||r<0||r>=GRID) return -1;
  return r*GRID+c;
}

function handleTap(clientX, clientY){
  if(won) return;
  const rect=canvas.getBoundingClientRect();
  const x=(clientX-rect.left)*(cw/rect.width);
  const y=(clientY-rect.top)*(ch/rect.height);
  const idx=tileAt(x,y);
  if(idx<0) return;
  if(neighbors(empty).includes(idx)){
    board[empty]=board[idx]; board[idx]=CELLS-1; empty=idx;
    moves++; statMoves.textContent=moves;
    render();
    if(isSolved()) setTimeout(win,80);
  }
}

canvas.addEventListener("click", e=>handleTap(e.clientX, e.clientY));
canvas.addEventListener("touchstart", e=>e.preventDefault(), {passive:false});
canvas.addEventListener("touchend", e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, {passive:false});

function win(){
  won=true; clearInterval(timerInt);
  if(!completed.includes(currentPuzzle)) completed.push(currentPuzzle);
  render();
  const m=Math.floor(seconds/60), s=seconds%60;
  document.getElementById("win-moves").textContent=
    moves+" hamlede, "+m+":"+String(s).padStart(2,"0")+"'de tamamladınız";
  document.getElementById("next-btn").textContent=
    currentPuzzle<PUZZLES.length-1?"Sonraki Sahne →":"Baştan Oyna ↺";
  winOverlay.classList.add("show");
  initUI();
}

document.getElementById("next-btn").addEventListener("click",()=>loadPuzzle(currentPuzzle+1));

document.getElementById("shuffle-btn").addEventListener("click",()=>{
  if(won) return;
  shuffle(); render();
  moves=0; statMoves.textContent="0";
  seconds=0; statTime.textContent="0:00";
});

document.getElementById("hint-btn").addEventListener("click",()=>{
  hintMode=!hintMode;
  document.getElementById("hint-btn").textContent=hintMode?"◎ İpucunu Gizle":"◉ İpucu Göster";
  render();
});

window.addEventListener("resize",()=>loadPuzzle(currentPuzzle));

loadPuzzle(0);
</script>
</body>
</html>
